<body>
  <div id="root">
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #0F172A;
        z-index: 9999;
      }
      .loader-circle {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 2rem;
        width: 100px;
        height: 100px;
      }
      .loader-ring {
        position: absolute;
        inset: 0;
        border: 4px solid rgba(184, 149, 68, 0.3);
        border-radius: 50%;
      }
      .loader-spin {
        position: absolute;
        inset: 0;
        border: 4px solid #B89544;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .loader-logo {
        width: 60px;
        height: 60px;
        object-fit: contain;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .loader-text {
        color: #B89544;
        font-weight: 900;
        letter-spacing: 0.1em;
        font-size: 0.875rem;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        font-family: 'Cairo', sans-serif;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
      }
    </style>
    <div id="initial-loader">
      <div class="loader-circle">
        <div class="loader-ring"></div>
        <div class="loader-spin"></div>
        <img src="/logo.webp" alt="Loading" class="loader-logo" />
      </div>
      <div class="loader-text">جاري التحميل...</div>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>
